{% extends "base.html" %}

{% block content %}

<h1>Products</h1>

{% for product in products %}
    <div>
<h2> <a href="{% url 'product_detail' product.id %}"> {{ product.name }}</a> </h2>
        <p>{{ product.description|truncatechars:80 }}</p>
        <p>£{{ product.price }}</p>
    </div>
{% empty %}
    <p>No products available.</p>
{% endfor %}

{% endblock %}
