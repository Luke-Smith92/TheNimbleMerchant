{% extends "base.html" %}

{% block content %}

<section class="product-form-section">
    <h1>{{ page_title }}</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="button">
            {{ button_text }}
        </button>

        <a href="{% url 'products' %}" class="button">
            Cancel
        </a>
    </form>
</section>

{% endblock %}
