{% extends "base.html" %}

{% block content %}

<h1>Checkout</h1>

<form method="POST" action="{% url 'checkout' %}" id="payment-form">
    {% csrf_token %}

    <h2>Delivery Details</h2>

    <label for="full_name">Full Name</label>
    <input type="text" name="full_name" id="full_name" required>

    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" required>

    <label for="phone_number">Phone Number</label>
    <input type="text" name="phone_number" id="phone_number" required>

    <label for="address">Address</label>
    <input type="text" name="address" id="address" required>

    <label for="town_or_city">Town or City</label>
    <input type="text" name="town_or_city" id="town_or_city" required>

    <label for="postcode">Postcode</label>
    <input type="text" name="postcode" id="postcode" required>
    
    <h2>Payment</h2>
    <div>
    <label>Card Number</label>
    <div id="card-number"></div>
</div>

<div>
    <label>Expiry Date</label>
    <div id="card-expiry"></div>
</div>

<div>
    <label>CVC</label>
    <div id="card-cvc"></div>
</div>

<div id="card-errors" role="alert"></div>

    <button id="submit-button" type="submit">Complete Order</button>
</form>

<a href="{% url 'view_cart' %}">Back to Cart</a>

{{ stripe_public_key|json_script:"id_stripe_public_key" }}
{{ client_secret|json_script:"id_client_secret" }}

<script src="https://js.stripe.com/v3/"></script>
<script>
   const stripePublicKey = JSON.parse(document.getElementById('id_stripe_public_key').textContent);
   const clientSecret = JSON.parse(document.getElementById('id_client_secret').textContent);

   const stripe = Stripe(stripePublicKey);
   const elements = stripe.elements();
   const cardNumber = elements.create('cardNumber');
   cardNumber.mount('#card-number');
   const cardExpiry = elements.create('cardExpiry');
   cardExpiry.mount('#card-expiry');
   const cardCvc = elements.create('cardCvc');
   cardCvc.mount('#card-cvc');
   
   const form = document.getElementById('payment-form');
   const errorDiv = document.getElementById('card-errors');

    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const result = await stripe.confirmCardPayment(clientSecret, {
            payment_method: {
                card: cardNumber,
            }
        });

        if (result.error) {
            errorDiv.textContent = result.error.message;
        } else {
            if (result.paymentIntent.status === 'succeeded') {
                form.submit();
            }
        }
    });
</script>

{% endblock %}
